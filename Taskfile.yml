version: "3"

vars:
  APP_NAME: "cleanc"
  BIN_DIR: "bin"
  PACKAGE_MANAGER: '{{.PACKAGE_MANAGER | default "npm"}}'
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml

tasks:
  build:amd64:
    summary: Builds the application for amd64 architecture
    cmds:
      - task: windows:build
        vars:
          ARCH: amd64

  build:arm64:
    summary: Builds the application for arm64 architecture
    cmds:
      - task: windows:build
        vars:
          ARCH: arm64

  package:amd64:
    summary: Packages the application for amd64 architecture
    cmds:
      - task: windows:package
        vars:
          ARCH: amd64

  package:arm64:
    summary: Packages the application for arm64 architecture
    cmds:
      - task: windows:package
        vars:
          ARCH: arm64

  run:
    summary: Runs the application
    cmds:
      - task: windows:run

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}
